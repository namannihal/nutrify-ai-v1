  <meta property="og:title" content="Nutrify-AI - Your Adaptive AI Health Companion" />
  <meta property="og:description" content="Get personalized nutrition and fitness plans powered by agentic AI. Analyze, Adapt, Act - your health journey optimized." />

  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />

  <!-- Single Page App Support for GitHub Pages -->
  <script type="text/javascript">
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) { 
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
