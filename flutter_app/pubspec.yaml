name: nutrify_ai
description: "Nutrify-AI - Agentic AI-powered fitness and nutrition platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # Navigation & State Management
  go_router: ^14.6.1
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  
  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0
  json_annotation: ^4.9.0
  
  # Local Storage & Cache
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  
  # Authentication & Security  
  jwt_decoder: ^2.0.1
  crypto: ^3.0.5
  
  # UI Components & Animation
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  
  # Charts & Progress
  fl_chart: ^0.69.0
  percent_indicator: ^4.2.3
  
  # Date & Time
  intl: ^0.19.0
  
  # Utils
  uuid: ^4.5.0
  logger: ^2.4.0
  
  # Camera & Image
  image_picker: ^1.1.2

  # URL & Web
  url_launcher: ^6.3.1

  # Push Notifications (for future)
  firebase_messaging: ^15.1.3
  
  # Local Database (for offline storage)
  sqflite: ^2.4.0
  path: ^1.9.0
  
  # Device Info & Permissions
  device_info_plus: ^10.1.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  
  # Testing
  mockito: ^5.4.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
  
  # Using Google Fonts instead of local fonts
