name: Frontend CI/CD

on:
  workflow_dispatch:

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run tests
        run: |
          cd frontend
          pnpm test || echo "No tests configured yet"

      - name: Build
        run: |
          cd frontend
          pnpm build
        env:
          VITE_API_URL: https://nutrify-backend-dev.example.com

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Run ESLint
        run: |
          cd frontend
          pnpm lint || echo "Linting completed with warnings"

  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push frontend image
        run: |
          cd frontend
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://${{ steps.get-url.outputs.frontend_url }}
    
    steps:
      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_CONTAINER_APP || 'nutrify-frontend-dev' }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || 'nutrify-dev-rg' }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}

      - name: Get frontend URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name ${{ vars.FRONTEND_CONTAINER_APP || 'nutrify-frontend-dev' }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || 'nutrify-dev-rg' }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "frontend_url=$URL" >> $GITHUB_OUTPUT
          echo "🚀 Frontend deployed to: https://$URL"
