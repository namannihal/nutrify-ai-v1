name: Backend CI/CD

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci-only

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          flags: backend

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: |
          cd backend
          ruff check app/

      - name: Run type checking
        run: |
          cd backend
          mypy app/ --ignore-missing-imports || echo "Type checking completed with warnings"

  build:
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push backend image
        run: |
          cd backend
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/backend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://${{ steps.get-url.outputs.backend_url }}
    
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ vars.BACKEND_CONTAINER_APP || 'nutrify-backend-dev' }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || 'nutrify-dev-rg' }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/backend:${{ github.sha }}

      - name: Run migrations
        run: |
          echo "⚠️ Run migrations manually: az containerapp exec --name nutrify-backend-dev --resource-group nutrify-dev-rg --command 'alembic upgrade head'"

      - name: Get backend URL
        id: get-url
        run: |
          URL=$(az containerapp show \
            --name ${{ vars.BACKEND_CONTAINER_APP || 'nutrify-backend-dev' }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP || 'nutrify-dev-rg' }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "backend_url=$URL" >> $GITHUB_OUTPUT
          echo "🚀 Backend deployed to: https://$URL"
