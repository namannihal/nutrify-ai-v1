version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nutrify-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nutrify_user
      POSTGRES_PASSWORD: nutrify_password
      POSTGRES_DB: nutrify_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrify_user -d nutrify_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutrify-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: nutrify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nutrify-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrify-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override for container networking
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://nutrify_user:nutrify_password@postgres:5432/nutrify_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app  # Mount for hot reload in development
      - ./alembic:/app/alembic
    networks:
      - nutrify-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  nutrify-network:
    driver: bridge
