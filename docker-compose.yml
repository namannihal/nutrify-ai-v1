services:
  # PostgreSQL Database - COMMENTED OUT (Using Supabase instead)
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: nutrify_ai
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: nutrify123
  #   ports:
  #     - "5433:5432"
