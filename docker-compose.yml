  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override Redis URL to use Docker service name
      - REDIS_URL=redis://redis:6379/0
    # For local development with hot-reload, uncomment the next line:
    # volumes:
    #   - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nutrify-network

